<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>唐诗三百首 · 墨韵</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=ZCOOL+QingKe+HuangYou&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #100d08;
    --paper: #f5edd8;
    --paper-dim: rgba(245,237,216,0.7);
    --vermillion: #b83030;
    --vermillion-light: #e04040;
    --gold: #c9a227;
    --mist: rgba(245,237,216,0.05);
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--ink);
    color: var(--paper);
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
    overflow-x: hidden;
    padding-top: 50px;
  }

  .nav-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    background: rgba(16, 13, 8, 0.95);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
    padding: 0 20px;
    border-bottom: 1px solid rgba(184, 48, 48, 0.3);
  }

  .nav-bar-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 50px;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--paper);
  }

  .nav-logo-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--vermillion) 0%, var(--gold) 100%);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 16px;
  }

  .nav-logo-text {
    font-weight: 700;
    font-size: 16px;
    background: linear-gradient(135deg, var(--vermillion) 0%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nav-link {
    padding: 6px 14px;
    border-radius: 20px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s ease;
    color: var(--paper-dim);
    background: rgba(245, 237, 216, 0.05);
    border: 1px solid transparent;
  }

  .nav-link:hover {
    background: rgba(184, 48, 48, 0.2);
    color: var(--paper);
    border-color: var(--vermillion);
  }

  .nav-link.active {
    background: linear-gradient(135deg, var(--vermillion) 0%, var(--gold) 100%);
    color: white;
  }

  /* Atmospheric background */
  .bg-canvas {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 80% 60% at 10% 10%, rgba(50,30,12,0.9) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 90% 80%, rgba(30,15,5,0.95) 0%, transparent 60%),
      radial-gradient(ellipse 100% 100% at 50% 50%, rgba(184,48,48,0.04) 0%, transparent 70%);
  }

  /* Subtle ink lines */
  .bg-lines {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  }
  .bg-lines::before {
    content: '';
    position: absolute;
    top: 0; left: 20%; width: 1px; height: 100%;
    background: linear-gradient(to bottom, transparent, rgba(245,237,216,0.04) 30%, rgba(245,237,216,0.04) 70%, transparent);
  }
  .bg-lines::after {
    content: '';
    position: absolute;
    top: 0; left: 75%; width: 1px; height: 100%;
    background: linear-gradient(to bottom, transparent, rgba(245,237,216,0.03) 30%, rgba(245,237,216,0.03) 70%, transparent);
  }

  /* ─── HEADER ─── */
  .site-header {
    position: relative; z-index: 10;
    padding: 56px 40px 36px;
    display: flex; flex-direction: column; align-items: center;
    border-bottom: 1px solid rgba(245,237,216,0.08);
  }
  .site-header::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 50%; transform: translateX(-50%);
    width: 80px; height: 2px;
    background: var(--vermillion);
    border-radius: 1px;
  }

  .logo-wrap {
    display: flex; align-items: center; gap: 20px;
    animation: fadeDown 1s ease both;
  }
  .logo-deco {
    font-size: 1.2rem; color: var(--vermillion); opacity: 0.7;
    animation: pulse 4s infinite ease-in-out;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.9} }

  .logo-text {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: clamp(2.6rem, 7vw, 5rem);
    letter-spacing: 0.35em;
    background: linear-gradient(160deg, #f5edd8 20%, #c9a227 55%, #f5edd8 90%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    text-shadow: none;
    animation: fadeDown 1s 0.1s ease both;
  }

  .logo-en {
    font-size: 0.72rem; letter-spacing: 0.45em; color: rgba(245,237,216,0.3);
    margin-top: 10px; text-transform: uppercase;
    animation: fadeDown 1s 0.25s ease both;
  }

  @keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }

  /* Search */
  .search-bar {
    display: flex; margin-top: 28px; gap: 0;
    animation: fadeDown 1s 0.4s ease both;
    border: 1px solid rgba(245,237,216,0.12);
  }
  .search-bar input {
    background: rgba(245,237,216,0.04); border: none;
    color: var(--paper); padding: 11px 22px;
    font-family: 'Noto Serif SC', serif; font-size: 0.88rem;
    width: 300px; outline: none; letter-spacing: 0.05em;
    transition: background 0.3s;
  }
  .search-bar input:focus { background: rgba(245,237,216,0.08); }
  .search-bar input::placeholder { color: rgba(245,237,216,0.25); }
  .search-bar button {
    background: var(--vermillion); border: none;
    color: var(--paper); padding: 11px 22px;
    font-family: 'ZCOOL XiaoWei', serif; font-size: 0.9rem;
    letter-spacing: 0.2em; cursor: pointer; transition: background 0.3s;
  }
  .search-bar button:hover { background: var(--vermillion-light); }

  /* ─── NAV ─── */
  .cat-nav {
    position: relative; z-index: 10;
    display: flex; flex-wrap: wrap; justify-content: center; gap: 6px;
    padding: 22px 30px;
    animation: fadeIn 1s 0.6s ease both;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .cat-btn {
    background: transparent;
    border: 1px solid rgba(245,237,216,0.14);
    color: rgba(245,237,216,0.5);
    padding: 5px 18px; font-family: 'Noto Serif SC', serif;
    font-size: 0.78rem; letter-spacing: 0.12em; cursor: pointer;
    transition: all 0.28s; position: relative;
  }
  .cat-btn:hover { color: var(--paper); border-color: rgba(245,237,216,0.35); }
  .cat-btn.on {
    background: rgba(184,48,48,0.18);
    border-color: var(--vermillion); color: var(--paper);
  }

  /* ─── HERO ─── */
  .hero-section {
    position: relative; z-index: 10;
    max-width: 1300px; margin: 0 auto 50px;
    padding: 0 30px;
    animation: fadeIn 1s 0.7s ease both;
  }

  .hero-card {
    position: relative; overflow: hidden;
    border: 1px solid rgba(245,237,216,0.09);
    background: rgba(245,237,216,0.025);
    padding: 50px 56px;
    cursor: pointer;
    transition: background 0.35s;
    display: grid; grid-template-columns: 1fr auto;
    gap: 40px; align-items: center;
  }
  .hero-card:hover { background: rgba(245,237,216,0.05); }
  .hero-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: linear-gradient(to bottom, transparent, var(--vermillion), transparent);
  }

  .hero-label {
    font-size: 0.65rem; letter-spacing: 0.5em; color: var(--vermillion);
    margin-bottom: 18px; opacity: 0.85;
  }
  .hero-title {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    letter-spacing: 0.22em; margin-bottom: 6px;
  }
  .hero-meta {
    font-size: 0.8rem; color: rgba(245,237,216,0.38);
    letter-spacing: 0.22em; margin-bottom: 32px;
  }
  .hero-meta b { color: var(--gold); font-weight: 400; }
  .hero-lines {
    font-size: clamp(0.98rem, 1.6vw, 1.25rem);
    line-height: 3; letter-spacing: 0.14em;
    color: rgba(245,237,216,0.82);
  }
  .hero-watermark {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 7rem; color: rgba(245,237,216,0.025);
    writing-mode: vertical-rl; letter-spacing: -0.05em;
    user-select: none; white-space: nowrap;
    line-height: 1;
  }

  /* ─── STATS ─── */
  .stats-row {
    position: relative; z-index: 10;
    max-width: 1300px; margin: 0 auto 40px;
    padding: 0 30px;
    animation: fadeIn 1s 0.8s ease both;
  }
  .stats-inner {
    display: flex; justify-content: center; gap: 0;
    border: 1px solid rgba(245,237,216,0.07);
  }
  .stat-item {
    flex: 1; text-align: center; padding: 20px 16px;
    border-right: 1px solid rgba(245,237,216,0.07);
  }
  .stat-item:last-child { border-right: none; }
  .stat-n {
    font-family: 'ZCOOL QingKe HuangYou', serif;
    font-size: 1.9rem; color: var(--gold); line-height: 1; margin-bottom: 6px;
  }
  .stat-l { font-size: 0.66rem; letter-spacing: 0.22em; color: rgba(245,237,216,0.28); }

  /* ─── GRID ─── */
  .grid-section {
    position: relative; z-index: 10;
    max-width: 1300px; margin: 0 auto;
    padding: 0 30px 80px;
    animation: fadeIn 1s 0.9s ease both;
  }

  .sec-hd {
    text-align: center; margin-bottom: 24px;
    display: flex; align-items: center; gap: 18px;
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 0.9rem; letter-spacing: 0.4em;
    color: rgba(245,237,216,0.32);
  }
  .sec-hd::before, .sec-hd::after {
    content: ''; flex: 1; height: 1px;
    background: rgba(245,237,216,0.07);
  }

  .poem-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 2px;
  }

  .poem-card {
    padding: 28px 26px; cursor: pointer;
    border: 1px solid rgba(245,237,216,0.055);
    background: rgba(245,237,216,0.02);
    transition: all 0.35s; position: relative; overflow: hidden;
  }
  .poem-card:hover {
    background: rgba(245,237,216,0.065);
    border-color: rgba(245,237,216,0.12);
    transform: translateY(-3px);
  }
  .poem-card::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--vermillion), transparent);
    transform: scaleX(0); transition: transform 0.4s;
  }
  .poem-card:hover::after { transform: scaleX(1); }

  .pc-id { font-size: 0.6rem; color: rgba(245,237,216,0.18); font-family: monospace; margin-bottom: 10px; }
  .pc-title { font-family: 'ZCOOL XiaoWei', serif; font-size: 1.18rem; letter-spacing: 0.18em; margin-bottom: 5px; }
  .pc-author { font-size: 0.72rem; letter-spacing: 0.18em; color: rgba(245,237,216,0.32); margin-bottom: 16px; }
  .pc-author span { color: var(--gold); }
  .pc-preview {
    font-size: 0.82rem; line-height: 2.2; letter-spacing: 0.07em;
    color: rgba(245,237,216,0.45);
    overflow: hidden; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .pc-cat {
    margin-top: 14px; display: inline-block; font-size: 0.62rem;
    letter-spacing: 0.15em; color: var(--vermillion);
    border: 1px solid rgba(184,48,48,0.35); padding: 2px 8px;
  }

  /* ─── MODAL ─── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(5,4,2,0.88); backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.4s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal-panel {
    background: linear-gradient(145deg, #17120a, #120e07);
    border: 1px solid rgba(245,237,216,0.12);
    width: min(660px, 92vw);
    max-height: 88vh; overflow-y: auto;
    padding: 56px 50px; position: relative;
    transform: scale(0.94) translateY(20px); transition: transform 0.4s;
    scrollbar-width: thin; scrollbar-color: rgba(245,237,216,0.1) transparent;
  }
  .modal-overlay.open .modal-panel { transform: scale(1) translateY(0); }

  .modal-x {
    position: absolute; top: 18px; right: 22px;
    background: none; border: none; color: rgba(245,237,216,0.28);
    font-size: 1.3rem; cursor: pointer; transition: color 0.3s; line-height: 1;
  }
  .modal-x:hover { color: var(--vermillion); }

  .m-title { font-family: 'ZCOOL XiaoWei', serif; font-size: 2rem; letter-spacing: 0.24em; margin-bottom: 6px; }
  .m-meta { font-size: 0.78rem; letter-spacing: 0.28em; color: rgba(245,237,216,0.33); margin-bottom: 32px; }
  .m-meta span { color: var(--gold); }

  .m-controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 32px; }
  .m-btn {
    background: rgba(245,237,216,0.04); border: 1px solid rgba(245,237,216,0.12);
    color: rgba(245,237,216,0.45); padding: 6px 16px;
    font-family: 'Noto Serif SC', serif; font-size: 0.72rem;
    letter-spacing: 0.12em; cursor: pointer; transition: all 0.28s;
  }
  .m-btn:hover, .m-btn.on { background: rgba(184,48,48,0.18); border-color: var(--vermillion); color: var(--paper); }

  .m-poem {
    font-size: 1.18rem; line-height: 3.2; letter-spacing: 0.18em;
    color: rgba(245,237,216,0.88);
    border-left: 2px solid rgba(184,48,48,0.3); padding-left: 22px;
    margin-bottom: 36px; transition: all 0.3s;
  }
  .m-poem.vert {
    writing-mode: vertical-rl;
    border-left: none; border-top: 2px solid rgba(184,48,48,0.3);
    padding-left: 0; padding-top: 18px;
    max-height: 280px; line-height: 2.8;
    letter-spacing: 0.3em;
  }

  .m-note {
    font-size: 0.8rem; line-height: 2.1; letter-spacing: 0.04em;
    color: rgba(245,237,216,0.36);
    border-top: 1px solid rgba(245,237,216,0.07); padding-top: 22px;
  }

  /* ─── IMMERSIVE ─── */
  .immersive {
    position: fixed; inset: 0; z-index: 900;
    background: #080604;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.5s;
  }
  .immersive.open { opacity: 1; pointer-events: all; }

  .imm-inner {
    display: flex; align-items: center; gap: 60px;
    padding: 40px;
  }
  .imm-vert-title {
    writing-mode: vertical-rl;
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 0.78rem; letter-spacing: 0.5em;
    color: rgba(245,237,216,0.2);
  }
  .imm-poem {
    writing-mode: vertical-rl;
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: clamp(1.4rem, 3vw, 2.1rem);
    letter-spacing: 0.4em; line-height: 2.6;
    color: rgba(245,237,216,0.88);
    max-height: 72vh;
  }
  .imm-sep {
    width: 1px; height: 180px;
    background: linear-gradient(to bottom, transparent, rgba(184,48,48,0.4), transparent);
  }
  .imm-exit {
    position: fixed; top: 22px; right: 24px;
    background: none; border: 1px solid rgba(245,237,216,0.15);
    color: rgba(245,237,216,0.38); padding: 7px 18px;
    font-family: 'Noto Serif SC', serif; font-size: 0.72rem;
    letter-spacing: 0.2em; cursor: pointer; transition: all 0.3s;
  }
  .imm-exit:hover { color: var(--paper); border-color: rgba(245,237,216,0.4); }

  /* Ink ripple */
  .ripple {
    position: fixed; pointer-events: none; z-index: 9999;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(184,48,48,0.35) 0%, transparent 70%);
    transform: scale(0);
    animation: rip 0.55s ease-out both;
  }
  @keyframes rip { 0%{transform:scale(0);opacity:1} 100%{transform:scale(4);opacity:0} }

  .empty-msg { text-align:center; padding:70px; color:rgba(245,237,216,0.2); letter-spacing:0.3em; display:none; }

  ::-webkit-scrollbar { width:3px; }
  ::-webkit-scrollbar-thumb { background: rgba(245,237,216,0.08); }

  @media(max-width:640px) {
    .hero-card { grid-template-columns: 1fr; padding: 30px 24px; }
    .hero-watermark { display:none; }
    .modal-panel { padding: 36px 22px; }
    .stats-inner { flex-wrap:wrap; }
    .stat-item { min-width: 50%; border-bottom: 1px solid rgba(245,237,216,0.07); }
  }
</style>
</head>
<body>

  <div class="nav-bar-inner">
    <a href="/blog/" class="nav-logo">
      <div class="nav-logo-icon">📜</div>

    <div class="nav-links">

<div class="bg-canvas"></div>
<div class="bg-lines"></div>

<!-- HEADER -->
<header class="site-header">
  <div class="logo-wrap">
    <span class="logo-deco">✦</span>
    <div class="logo-text">唐诗三百首</div>
    <span class="logo-deco">✦</span>
  </div>
  <div class="logo-en">Tang Three Hundred · Classic Poetry Collection</div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="搜索诗题、诗人、诗句…" oninput="doSearch()">

</header>

<!-- CATEGORY NAV -->
<nav class="cat-nav">

  <button class="cat-btn" onclick="filterCat('山水田园',this)">山水田园</button>
  <button class="cat-btn" onclick="filterCat('边塞军旅',this)">边塞军旅</button>
  <button class="cat-btn" onclick="filterCat('送别离情',this)">送别离情</button>
  <button class="cat-btn" onclick="filterCat('怀古咏史',this)">怀古咏史</button>
  <button class="cat-btn" onclick="filterCat('思乡羁旅',this)">思乡羁旅</button>

  <button class="cat-btn" onclick="filterCat('爱情闺怨',this)">爱情闺怨</button>

</nav>

<!-- HERO -->
<section class="hero-section">
  <div class="hero-card" id="heroCard">
    <div>
      <div class="hero-label">✦ 今 日 推 荐</div>
      <div class="hero-title" id="hTitle"></div>
      <div class="hero-meta" id="hMeta"></div>
      <div class="hero-lines" id="hLines"></div>
    </div>
    <div class="hero-watermark" id="hWater"></div>
  </div>
</section>

<!-- STATS -->
<div class="stats-row">
  <div class="stats-inner">
    <div class="stat-item"><div class="stat-n">111</div><div class="stat-l">收 录 诗 篇</div></div>
    <div class="stat-item"><div class="stat-n">35</div><div class="stat-l">唐 代 诗 人</div></div>
    <div class="stat-item"><div class="stat-n">8</div><div class="stat-l">题 材 类 别</div></div>
    <div class="stat-item"><div class="stat-n" style="font-size:1.4rem;letter-spacing:0.1em">盛 唐</div><div class="stat-l">黄 金 时 代</div></div>
  </div>

<!-- GRID -->

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="maybeClose(event)">
  <div class="modal-panel">
    <button class="modal-x" onclick="closeModal()">✕</button>
    <div class="m-title" id="mTitle"></div>
    <div class="m-meta" id="mMeta"></div>
    <div class="m-controls">
      <button class="m-btn on" id="btnH" onclick="setMode('h')">横 排 阅 读</button>
      <button class="m-btn" id="btnV" onclick="setMode('v')">竖 排 阅 读</button>

    <div class="m-note" id="mNote"></div>

</div>

<!-- IMMERSIVE -->
<div class="immersive" id="immersive">
  <div class="imm-inner">

<script>
const DB = [
  // ===== 李白 =====
  {id:1,title:'静夜思',author:'李白',dy:'唐',cat:'思乡羁旅',
   lines:['床前明月光，','疑是地上霜。','举头望明月，','低头思故乡。'],
   note:'此诗是李白的代表作，语言简洁，情感真挚，表达游子思乡之情，千百年来脍炙人口，被译成数十种语言广泛流传。'},
  {id:2,title:'将进酒',author:'李白',dy:'唐',cat:'咏物言志',
   lines:['君不见黄河之水天上来，','奔流到海不复回。','君不见高堂明镜悲白发，','朝如青丝暮成雪。','人生得意须尽欢，','莫使金樽空对月。','天生我材必有用，','千金散尽还复来。'],
   note:'李白豪放派诗歌代表作，以夸张手法抒发人生苦短的感慨和豁达处世态度，气势磅礴。'},
  {id:3,title:'行路难·其一',author:'李白',dy:'唐',cat:'咏物言志',
   lines:['金樽清酒斗十千，','玉盘珍羞直万钱。','停杯投箸不能食，','拔剑四顾心茫然。','欲渡黄河冰塞川，','将登太行雪满山。','长风破浪会有时，','直挂云帆济沧海。'],
   note:'李白政治理想受挫时所作，充满矛盾与激情，结尾展现出昂扬豪情，千古激励人心。'},
  {id:4,title:'黄鹤楼送孟浩然之广陵',author:'李白',dy:'唐',cat:'送别离情',
   lines:['故人西辞黄鹤楼，','烟花三月下扬州。','孤帆远影碧空尽，','唯见长江天际流。'],
   note:'李白送别诗的杰作，景与情融为一体，以江水无尽象征依依惜别之情，意境开阔动人。'},
  {id:5,title:'月下独酌',author:'李白',dy:'唐',cat:'咏物言志',
   lines:['花间一壶酒，','独酌无相亲。','举杯邀明月，','对影成三人。','月既不解饮，','影徒随我身。','暂伴月将影，','行乐须及春。'],
   note:'李白以月和影为伴，表现出孤独中自得其乐的旷达精神，是李白浪漫气质的独特展示。'},
  {id:6,title:'蜀道难',author:'李白',dy:'唐',cat:'山水田园',
   lines:['噫吁嚱，危乎高哉！','蜀道之难，难于上青天！','蚕丛及鱼凫，开国何茫然。','尔来四万八千岁，不与秦塞通人烟。','西当太白有鸟道，可以横绝峨眉巅。','地崩山摧壮士死，然后天梯石栈相钩连。'],
   note:'李白代表作之一，以夸张笔法描绘蜀道险峻，被誉为"奇之又奇，然自骚人以还，鲜有此体调"。'},
  {id:7,title:'早发白帝城',author:'李白',dy:'唐',cat:'山水田园',
   lines:['朝辞白帝彩云间，','千里江陵一日还。','两岸猿声啼不住，','轻舟已过万重山。'],
   note:'李白流放夜郎遇赦返回时所作，轻快流畅，表达了重获自由后的喜悦心情。'},
  {id:8,title:'望庐山瀑布',author:'李白',dy:'唐',cat:'山水田园',
   lines:['日照香炉生紫烟，','遥看瀑布挂前川。','飞流直下三千尺，','疑是银河落九天。'],
   note:'李白描写庐山瀑布的绝唱，以夸张比喻展现瀑布的壮美气势，千古传诵。'},
  {id:9,title:'赠汪伦',author:'李白',dy:'唐',cat:'送别离情',
   lines:['李白乘舟将欲行，','忽闻岸上踏歌声。','桃花潭水深千尺，','不及汪伦送我情。'],
   note:'李白临行时汪伦踏歌相送，诗人以潭水之深比友情之深，真挚感人。'},
  {id:10,title:'夜宿山寺',author:'李白',dy:'唐',cat:'山水田园',
   lines:['危楼高百尺，','手可摘星辰。','不敢高声语，','恐惊天上人。'],
   note:'李白描写山寺之高，以夸张手法展现高楼耸立入云的壮观景象。'},
  {id:11,title:'独坐敬亭山',author:'李白',dy:'唐',cat:'山水田园',
   lines:['众鸟高飞尽，','孤云独去闲。','相看两不厌，','只有敬亭山。'],
   note:'李白晚年孤独时所作，以山为友，表达孤寂中的旷达情怀。'},
  {id:12,title:'关山月',author:'李白',dy:'唐',cat:'边塞军旅',
   lines:['明月出天山，','苍茫云海间。','长风几万里，','吹度玉门关。','汉下白登道，','胡窥青海湾。','由来征战地，','不见有人还。'],
   note:'李白边塞诗名篇，以月亮为视角，展现边疆战争的残酷和征人的思乡之情。'},
  {id:13,title:'送友人',author:'李白',dy:'唐',cat:'送别离情',
   lines:['青山横北郭，','白水绕东城。','此地一为别，','孤蓬万里征。','浮云游子意，','落日故人情。','挥手自兹去，','萧萧班马鸣。'],
   note:'李白送别诗佳作，以景抒情，"浮云游子意，落日故人情"为千古名句。'},
  {id:14,title:'春夜洛城闻笛',author:'李白',dy:'唐',cat:'思乡羁旅',
   lines:['谁家玉笛暗飞声，','散入春风满洛城。','此夜曲中闻折柳，','何人不起故园情。'],
   note:'李白客居洛阳闻笛声而起思乡之情，"折柳"为送别之曲，引发游子共鸣。'},
  {id:15,title:'宣州谢脁楼饯别校书叔云',author:'李白',dy:'唐',cat:'送别离情',
   lines:['弃我去者，昨日之日不可留。','乱我心者，今日之日多烦忧。','长风万里送秋雁，','对此可以酣高楼。','蓬莱文章建安骨，','中间小谢又清发。','俱怀逸兴壮思飞，','可上九天揽明月。'],
   note:'李白在谢脁楼饯别时所作，充满怀才不遇的愤懑和豪放不羁的精神。'},
  {id:16,title:'金陵酒肆留别',author:'李白',dy:'唐',cat:'送别离情',
   lines:['风吹柳花满店香，','吴姬压酒劝客尝。','金陵子弟来相送，','欲行不行各尽觞。','请君试问东流水，','别意与之谁短长。'],
   note:'李白离开金陵时留别之作，以流水比喻别意之长，情深意切。'},
  {id:17,title:'子夜吴歌·秋歌',author:'李白',dy:'唐',cat:'思乡羁旅',
   lines:['长安一片月，','万户捣衣声。','秋风吹不尽，','总是玉关情。','何日平胡虏，','良人罢远征。'],
   note:'李白仿民歌体所作，描写妇女为远征丈夫捣衣的情景，表达对战争的厌倦和对亲人的思念。'},

  // ===== 杜甫 =====
  {id:18,title:'望岳',author:'杜甫',dy:'唐',cat:'山水田园',
   lines:['岱宗夫如何？','齐鲁青未了。','造化钟神秀，','阴阳割昏晓。','荡胸生曾云，','决眦入归鸟。','会当凌绝顶，','一览众山小。'],
   note:'杜甫年轻时的豪迈之作，充满积极向上的进取精神，"会当凌绝顶，一览众山小"已成千古名句。'},
  {id:19,title:'春望',author:'杜甫',dy:'唐',cat:'怀古咏史',
   lines:['国破山河在，','城春草木深。','感时花溅泪，','恨别鸟惊心。','烽火连三月，','家书抵万金。','白头搔更短，','浑欲不胜簪。'],
   note:'安史之乱时杜甫的伤时之作，"烽火连三月，家书抵万金"道尽乱世思亲之苦，令人动容。'},
  {id:20,title:'登高',author:'杜甫',dy:'唐',cat:'思乡羁旅',
   lines:['风急天高猿啸哀，','渚清沙白鸟飞回。','无边落木萧萧下，','不尽长江滚滚来。','万里悲秋常作客，','百年多病独登台。','艰难苦恨繁霜鬓，','潦倒新停浊酒杯。'],
   note:'被誉为"古今七言律第一"，八句俱是律联，对仗工整，意境悲壮，是杜甫晚年的巅峰之作。'},
  {id:21,title:'旅夜书怀',author:'杜甫',dy:'唐',cat:'思乡羁旅',
   lines:['细草微风岸，','危樯独夜舟。','星垂平野阔，','月涌大江流。','名岂文章著，','官应老病休。','飘飘何所似，','天地一沙鸥。'],
   note:'杜甫晚年漂泊时所作，宏阔景象中包含深沉孤独，是"诗圣"晚境凄凉的真实写照。'},
  {id:22,title:'蜀相',author:'杜甫',dy:'唐',cat:'怀古咏史',
   lines:['丞相祠堂何处寻，','锦官城外柏森森。','映阶碧草自春色，','隔叶黄鹂空好音。','三顾频烦天下计，','两朝开济老臣心。','出师未捷身先死，','长使英雄泪满襟。'],
   note:'杜甫缅怀诸葛亮的诗作，"出师未捷身先死，长使英雄泪满襟"成为咏叹英雄壮志未酬的名句。'},
  {id:23,title:'客至',author:'杜甫',dy:'唐',cat:'山水田园',
   lines:['舍南舍北皆春水，','但见群鸥日日来。','花径不曾缘客扫，','蓬门今始为君开。','盘飧市远无兼味，','樽酒家贫只旧醅。','肯与邻翁相对饮，','隔篱呼取尽余杯。'],
   note:'杜甫在成都草堂招待客人的诗作，展现了诗人质朴真诚的性格和生活情趣。'},
  {id:24,title:'春夜喜雨',author:'杜甫',dy:'唐',cat:'山水田园',
   lines:['好雨知时节，','当春乃发生。','随风潜入夜，','润物细无声。','野径云俱黑，','江船火独明。','晓看红湿处，','花重锦官城。'],
   note:'杜甫描写春雨的名篇，"随风潜入夜，润物细无声"成为形容默默奉献的名句。'},
  {id:25,title:'绝句',author:'杜甫',dy:'唐',cat:'山水田园',
   lines:['两个黄鹂鸣翠柳，','一行白鹭上青天。','窗含西岭千秋雪，','门泊东吴万里船。'],
   note:'杜甫在成都草堂所作，四句皆对仗，色彩鲜明，画面生动，为绝句佳作。'},
  {id:26,title:'江南逢李龟年',author:'杜甫',dy:'唐',cat:'怀古咏史',
   lines:['岐王宅里寻常见，','崔九堂前几度闻。','正是江南好风景，','落花时节又逢君。'],
   note:'杜甫晚年邂逅昔日宫廷乐师李龟年，感慨世事沧桑，看似平淡却蕴含深意。'},
  {id:27,title:'茅屋为秋风所破歌',author:'杜甫',dy:'唐',cat:'咏物言志',
   lines:['八月秋高风怒号，','卷我屋上三重茅。','茅飞渡江洒江郊，','高者挂罥长林梢，','下者飘转沉塘坳。','安得广厦千万间，','大庇天下寒士俱欢颜，','风雨不动安如山。'],
   note:'杜甫茅屋被秋风所破，却推己及人，愿天下寒士皆有庇护，展现了伟大的人道主义精神。'},
  {id:28,title:'兵车行',author:'杜甫',dy:'唐',cat:'边塞军旅',
   lines:['车辚辚，马萧萧，','行人弓箭各在腰。','爷娘妻子走相送，','尘埃不见咸阳桥。','牵衣顿足拦道哭，','哭声直上干云霄。','道旁过者问行人，','行人但云点行频。'],
   note:'杜甫反映战争给百姓带来苦难的名篇，语言质朴有力，充满对人民的深切同情。'},
  {id:29,title:'闻官军收河南河北',author:'杜甫',dy:'唐',cat:'思乡羁旅',
   lines:['剑外忽传收蓟北，','初闻涕泪满衣裳。','却看妻子愁何在，','漫卷诗书喜欲狂。','白日放歌须纵酒，','青春作伴好还乡。','即从巴峡穿巫峡，','便下襄阳向洛阳。'],
   note:'杜甫闻安史之乱平定后狂喜之作，被称为杜甫"生平第一快诗"，畅快淋漓。'},
  {id:30,title:'月夜忆舍弟',author:'杜甫',dy:'唐',cat:'思乡羁旅',
   lines:['戍鼓断人行，','边秋一雁声。','露从今夜白，','月是故乡明。','有弟皆分散，','无家问死生。','寄书长不达，','况乃未休兵。'],
   note:'杜甫思念离散兄弟之作，"露从今夜白，月是故乡明"为千古思乡名句。'},
  {id:31,title:'天末怀李白',author:'杜甫',dy:'唐',cat:'送别离情',
   lines:['凉风起天末，','君子意如何。','鸿雁几时到，','江湖秋水多。','文章憎命达，','魑魅喜人过。','应共冤魂语，','投诗赠汨罗。'],
   note:'杜甫流寓秦州时怀念李白之作，表达了对友人命运的关切和担忧。'},
  {id:32,title:'八阵图',author:'杜甫',dy:'唐',cat:'怀古咏史',
   lines:['功盖三分国，','名成八阵图。','江流石不转，','遗恨失吞吴。'],
   note:'杜甫咏叹诸葛亮的五言绝句，功业与遗恨并存，慨叹英雄壮志未酬。'},

  // ===== 王维 =====
  {id:33,title:'送元二使安西',author:'王维',dy:'唐',cat:'送别离情',
   lines:['渭城朝雨浥轻尘，','客舍青青柳色新。','劝君更尽一杯酒，','西出阳关无故人。'],
   note:'王维送别诗中最脍炙人口的一首，后被谱成《阳关三叠》，成为古代送别的标志性乐曲。'},
  {id:34,title:'鹿柴',author:'王维',dy:'唐',cat:'山水田园',
   lines:['空山不见人，','但闻人语响。','返景入深林，','复照青苔上。'],
   note:'王维"诗中有画，画中有诗"的代表，用极简语言营造出空灵寂静的禅意境界。'},
  {id:35,title:'相思',author:'王维',dy:'唐',cat:'爱情闺怨',
   lines:['红豆生南国，','春来发几枝。','愿君多采撷，','此物最相思。'],
   note:'王维借红豆表达相思之情，语言朴素而情意深长，"红豆"因此诗成为相思的代名词。'},
  {id:36,title:'竹里馆',author:'王维',dy:'唐',cat:'山水田园',
   lines:['独坐幽篁里，','弹琴复长啸。','深林人不知，','明月来相照。'],
   note:'王维《辋川集》中的一首，描写隐居生活的幽静与自得，充满禅意。'},
  {id:37,title:'山居秋暝',author:'王维',dy:'唐',cat:'山水田园',
   lines:['空山新雨后，','天气晚来秋。','明月松间照，','清泉石上流。','竹喧归浣女，','莲动下渔舟。','随意春芳歇，','王孙自可留。'],
   note:'王维山水诗代表作，描绘山居生活的宁静美好，"明月松间照，清泉石上流"为千古名句。'},
  {id:38,title:'终南别业',author:'王维',dy:'唐',cat:'哲理禅意',
   lines:['中岁颇好道，','晚家南山陲。','兴来每独往，','胜事空自知。','行到水穷处，','坐看云起时。','偶然值林叟，','谈笑无还期。'],
   note:'王维晚年隐居终南山所作，"行到水穷处，坐看云起时"展现随缘自适的人生境界。'},
  {id:39,title:'九月九日忆山东兄弟',author:'王维',dy:'唐',cat:'思乡羁旅',
   lines:['独在异乡为异客，','每逢佳节倍思亲。','遥知兄弟登高处，','遍插茱萸少一人。'],
   note:'王维十七岁时所作，"每逢佳节倍思亲"成为中国人佳节思亲的普遍心声。'},
  {id:40,title:'使至塞上',author:'王维',dy:'唐',cat:'边塞军旅',
   lines:['单车欲问边，','属国过居延。','征蓬出汉塞，','归雁入胡天。','大漠孤烟直，','长河落日圆。','萧关逢候骑，','都护在燕然。'],
   note:'王维出使边塞时所作，"大漠孤烟直，长河落日圆"被赞为"千古壮观"的名句。'},
  {id:41,title:'渭川田家',author:'王维',dy:'唐',cat:'山水田园',
   lines:['斜光照墟落，','穷巷牛羊归。','野老念牧童，','倚杖候荆扉。','雉雊麦苗秀，','蚕眠桑叶稀。','田夫荷锄至，','相见语依依。'],
   note:'王维描写田园生活的诗作，展现了农家生活的宁静与温馨。'},
  {id:42,title:'鸟鸣涧',author:'王维',dy:'唐',cat:'山水田园',
   lines:['人闲桂花落，','夜静春山空。','月出惊山鸟，','时鸣春涧中。'],
   note:'王维描写春夜山间的静谧，以动衬静，禅意悠然。'},
  {id:43,title:'杂诗',author:'王维',dy:'唐',cat:'思乡羁旅',
   lines:['君自故乡来，','应知故乡事。','来日绮窗前，','寒梅著花未？'],
   note:'王维询问故乡情况的诗作，以梅花寄托思乡之情，简短而情深。'},

  // ===== 孟浩然 =====
  {id:44,title:'春晓',author:'孟浩然',dy:'唐',cat:'山水田园',
   lines:['春眠不觉晓，','处处闻啼鸟。','夜来风雨声，','花落知多少。'],
   note:'孟浩然的山水田园诗代表作，语言清新自然，将春天清晨特有的慵懒与感伤融为一体。'},
  {id:45,title:'宿建德江',author:'孟浩然',dy:'唐',cat:'思乡羁旅',
   lines:['移舟泊烟渚，','日暮客愁新。','野旷天低树，','江清月近人。'],
   note:'孟浩然客居他乡时所作，以旷野和江月衬托羁旅之愁，意境深远。'},
  {id:46,title:'过故人庄',author:'孟浩然',dy:'唐',cat:'山水田园',
   lines:['故人具鸡黍，','邀我至田家。','绿树村边合，','青山郭外斜。','开轩面场圃，','把酒话桑麻。','待到重阳日，','还来就菊花。'],
   note:'孟浩然访友之作，描写农家生活的淳朴温馨，表达了对田园生活的向往。'},
  {id:47,title:'与诸子登岘山',author:'孟浩然',dy:'唐',cat:'怀古咏史',
   lines:['人事有代谢，','往来成古今。','江山留胜迹，','我辈复登临。','水落鱼梁浅，','天寒梦泽深。','羊公碑尚在，','读罢泪沾襟。'],
   note:'孟浩然登岘山怀古之作，慨叹人生无常，缅怀先贤羊祜的功业。'},
  {id:48,title:'望洞庭湖赠张丞相',author:'孟浩然',dy:'唐',cat:'山水田园',
   lines:['八月湖水平，','涵虚混太清。','气蒸云梦泽，','波撼岳阳城。','欲济无舟楫，','端居耻圣明。','坐观垂钓者，','徒有羡鱼情。'],
   note:'孟浩然投赠张九龄之作，以洞庭湖的壮阔比喻自己的抱负，含蓄表达求荐之意。'},

  // ===== 王之涣 =====
  {id:49,title:'登鹳雀楼',author:'王之涣',dy:'唐',cat:'哲理禅意',
   lines:['白日依山尽，','黄河入海流。','欲穷千里目，','更上一层楼。'],
   note:'王之涣名篇，前两句写景壮阔，后两句发出哲理感慨，勉励人们积极进取，不断超越自我。'},
  {id:50,title:'凉州词',author:'王之涣',dy:'唐',cat:'边塞军旅',
   lines:['黄河远上白云间，','一片孤城万仞山。','羌笛何须怨杨柳，','春风不度玉门关。'],
   note:'边塞诗中的千古绝唱，描写了戍边将士的苦楚，"春风不度玉门关"更成为历代传诵的名句。'},

  // ===== 王昌龄 =====
  {id:51,title:'出塞',author:'王昌龄',dy:'唐',cat:'边塞军旅',
   lines:['秦时明月汉时关，','万里长征人未还。','但使龙城飞将在，','不教胡马度阴山。'],
   note:'王昌龄边塞诗的压卷之作，以雄浑笔力展现边疆苍凉与战士悲壮，抒发了对良将的渴望。'},
  {id:52,title:'芙蓉楼送辛渐',author:'王昌龄',dy:'唐',cat:'送别离情',
   lines:['寒雨连江夜入吴，','平明送客楚山孤。','洛阳亲友如相问，','一片冰心在玉壶。'],
   note:'王昌龄送别诗名篇，"一片冰心在玉壶"成为表达高洁品格的千古名句。'},
  {id:53,title:'从军行·其四',author:'王昌龄',dy:'唐',cat:'边塞军旅',
   lines:['青海长云暗雪山，','孤城遥望玉门关。','黄沙百战穿金甲，','不破楼兰终不还。'],
   note:'王昌龄边塞诗代表作，表达将士誓死破敌的决心，气势豪迈。'},
  {id:54,title:'闺怨',author:'王昌龄',dy:'唐',cat:'爱情闺怨',
   lines:['闺中少妇不知愁，','春日凝妆上翠楼。','忽见陌头杨柳色，','悔教夫婿觅封侯。'],
   note:'王昌龄描写闺中少妇因丈夫远征而产生的悔意，细腻刻画了女性的心理变化。'},

  // ===== 白居易 =====
  {id:55,title:'琵琶行（节选）',author:'白居易',dy:'唐',cat:'咏物言志',
   lines:['浔阳江头夜送客，','枫叶荻花秋瑟瑟。','千呼万唤始出来，','犹抱琵琶半遮面。','大弦嘈嘈如急雨，','小弦切切如私语。','嘈嘈切切错杂弹，','大珠小珠落玉盘。'],
   note:'白居易以精湛笔墨描写琵琶女的高超技艺和悲惨命运，"同是天涯沦落人"道尽共鸣。'},
  {id:56,title:'长恨歌（节选）',author:'白居易',dy:'唐',cat:'爱情闺怨',
   lines:['汉皇重色思倾国，','御宇多年求不得。','天生丽质难自弃，','一朝选在君王侧。','回眸一笑百媚生，','六宫粉黛无颜色。','在天愿作比翼鸟，','在地愿为连理枝。'],
   note:'白居易的长篇叙事诗，讲述唐玄宗与杨贵妃的爱情悲剧，情感缠绵悱恻，广为传诵千年。'},
  {id:57,title:'赋得古原草送别',author:'白居易',dy:'唐',cat:'送别离情',
   lines:['离离原上草，','一岁一枯荣。','野火烧不尽，','春风吹又生。','远芳侵古道，','晴翠接荒城。','又送王孙去，','萋萋满别情。'],
   note:'白居易少年时所作，"野火烧不尽，春风吹又生"成为表现生命顽强不屈的名句。'},
  {id:58,title:'忆江南',author:'白居易',dy:'唐',cat:'山水田园',
   lines:['江南好，','风景旧曾谙。','日出江花红胜火，','春来江水绿如蓝。','能不忆江南？'],
   note:'白居易追忆江南美景的词作，色彩鲜明，意境优美，为忆江南题材的经典之作。'},
  {id:59,title:'暮江吟',author:'白居易',dy:'唐',cat:'山水田园',
   lines:['一道残阳铺水中，','半江瑟瑟半江红。','可怜九月初三夜，','露似真珠月似弓。'],
   note:'白居易描写秋江夕照的佳作，色彩绚丽，比喻精妙。'},
  {id:60,title:'问刘十九',author:'白居易',dy:'唐',cat:'山水田园',
   lines:['绿蚁新醅酒，','红泥小火炉。','晚来天欲雪，','能饮一杯无？'],
   note:'白居易邀请友人饮酒的小诗，温馨亲切，充满生活情趣。'},

  // ===== 杜牧 =====
  {id:61,title:'泊秦淮',author:'杜牧',dy:'唐',cat:'怀古咏史',
   lines:['烟笼寒水月笼沙，','夜泊秦淮近酒家。','商女不知亡国恨，','隔江犹唱后庭花。'],
   note:'杜牧借秦淮河夜景，讽刺统治者的醉生梦死，借古讽今，忧国之情溢于言表。'},
  {id:62,title:'山行',author:'杜牧',dy:'唐',cat:'山水田园',
   lines:['远上寒山石径斜，','白云生处有人家。','停车坐爱枫林晚，','霜叶红于二月花。'],
   note:'杜牧写秋景的绝唱，一改悲秋传统，以热烈笔调赞美秋日枫林的壮美，令人心旷神怡。'},
  {id:63,title:'秋夕',author:'杜牧',dy:'唐',cat:'爱情闺怨',
   lines:['银烛秋光冷画屏，','轻罗小扇扑流萤。','天阶夜色凉如水，','坐看牵牛织女星。'],
   note:'以宫女在秋夜扑流萤、仰望牛女星的情景，写出了深宫中女子寂寞孤独的处境，含蓄深沉。'},
  {id:64,title:'赤壁',author:'杜牧',dy:'唐',cat:'怀古咏史',
   lines:['折戟沉沙铁未销，','自将磨洗认前朝。','东风不与周郎便，','铜雀春深锁二乔。'],
   note:'杜牧咏史名篇，以假设之词议论历史，见解独特，发人深思。'},
  {id:65,title:'清明',author:'杜牧',dy:'唐',cat:'思乡羁旅',
   lines:['清明时节雨纷纷，','路上行人欲断魂。','借问酒家何处有，','牧童遥指杏花村。'],
   note:'杜牧描写清明时节的名篇，已成为清明节最具代表性的诗作，流传广泛。'},
  {id:66,title:'江南春',author:'杜牧',dy:'唐',cat:'山水田园',
   lines:['千里莺啼绿映红，','水村山郭酒旗风。','南朝四百八十寺，','多少楼台烟雨中。'],
   note:'杜牧描绘江南春景的佳作，色彩明丽，意境开阔，感慨历史的沧桑。'},
  {id:67,title:'赠别',author:'杜牧',dy:'唐',cat:'送别离情',
   lines:['多情却似总无情，','唯觉尊前笑不成。','蜡烛有心还惜别，','替人垂泪到天明。'],
   note:'杜牧送别诗，以蜡烛垂泪比喻离别之痛，含蓄深情。'},

  // ===== 李商隐 =====
  {id:68,title:'无题',author:'李商隐',dy:'唐',cat:'爱情闺怨',
   lines:['相见时难别亦难，','东风无力百花残。','春蚕到死丝方尽，','蜡炬成灰泪始干。','晓镜但愁云鬓改，','夜吟应觉月光寒。','蓬山此去无多路，','青鸟殷勤为探看。'],
   note:'"春蚕到死丝方尽，蜡炬成灰泪始干"成为形容至死不渝爱情的千古名句，历久弥新。'},
  {id:69,title:'锦瑟',author:'李商隐',dy:'唐',cat:'爱情闺怨',
   lines:['锦瑟无端五十弦，','一弦一柱思华年。','庄生晓梦迷蝴蝶，','望帝春心托杜鹃。','沧海月明珠有泪，','蓝田日暖玉生烟。','此情可待成追忆，','只是当时已惘然。'],
   note:'李商隐最具代表性的隐晦之诗，历来解读纷纭，意境朦胧，语言精美绝伦，令人叹为观止。'},
  {id:70,title:'夜雨寄北',author:'李商隐',dy:'唐',cat:'思乡羁旅',
   lines:['君问归期未有期，','巴山夜雨涨秋池。','何当共剪西窗烛，','却话巴山夜雨时。'],
   note:'李商隐思念妻子的诗作，以雨夜寄托相思，设想未来重逢时的情景，情深意切。'},
  {id:71,title:'嫦娥',author:'李商隐',dy:'唐',cat:'爱情闺怨',
   lines:['云母屏风烛影深，','长河渐落晓星沉。','嫦娥应悔偷灵药，','碧海青天夜夜心。'],
   note:'李商隐咏嫦娥之作，以仙人的孤独比喻人间处境，意境凄美。'},
  {id:72,title:'乐游原',author:'李商隐',dy:'唐',cat:'哲理禅意',
   lines:['向晚意不适，','驱车登古原。','夕阳无限好，','只是近黄昏。'],
   note:'李商隐登乐游原抒怀之作，"夕阳无限好，只是近黄昏"成为慨叹美好事物短暂的千古名句。'},
  {id:73,title:'贾生',author:'李商隐',dy:'唐',cat:'怀古咏史',
   lines:['宣室求贤访逐臣，','贾生才调更无伦。','可怜夜半虚前席，','不问苍生问鬼神。'],
   note:'李商隐咏贾谊之作，讽刺统治者不重用贤才，借古讽今。'},

  // ===== 刘禹锡 =====
  {id:74,title:'酬乐天扬州初逢席上见赠',author:'刘禹锡',dy:'唐',cat:'哲理禅意',
   lines:['巴山楚水凄凉地，','二十三年弃置身。','怀旧空吟闻笛赋，','到乡翻似烂柯人。','沉舟侧畔千帆过，','病树前头万木春。','今日听君歌一曲，','暂凭杯酒长精神。'],
   note:'"沉舟侧畔千帆过，病树前头万木春"揭示新陈代谢哲理，体现了诗人豁达向上的精神。'},
  {id:75,title:'乌衣巷',author:'刘禹锡',dy:'唐',cat:'怀古咏史',
   lines:['朱雀桥边野草花，','乌衣巷口夕阳斜。','旧时王谢堂前燕，','飞入寻常百姓家。'],
   note:'刘禹锡金陵怀古之作，以燕子的去向感慨世事沧桑，富贵无常。'},
  {id:76,title:'石头城',author:'刘禹锡',dy:'唐',cat:'怀古咏史',
   lines:['山围故国周遭在，','潮打空城寂寞回。','淮水东边旧时月，','夜深还过女墙来。'],
   note:'刘禹锡咏石头城之作，以月照空城感慨六朝繁华已成陈迹。'},
  {id:77,title:'秋词',author:'刘禹锡',dy:'唐',cat:'咏物言志',
   lines:['自古逢秋悲寂寥，','我言秋日胜春朝。','晴空一鹤排云上，','便引诗情到碧霄。'],
   note:'刘禹锡一反悲秋传统，以昂扬笔调赞美秋天，展现出积极乐观的精神。'},

  // ===== 张继 =====
  {id:78,title:'枫桥夜泊',author:'张继',dy:'唐',cat:'思乡羁旅',
   lines:['月落乌啼霜满天，','江枫渔火对愁眠。','姑苏城外寒山寺，','夜半钟声到客船。'],
   note:'描绘秋夜水乡独特意境，寒山寺因此诗名扬天下，每年除夕吸引众多游人聆听钟声。'},

  // ===== 孟郊 =====
  {id:79,title:'游子吟',author:'孟郊',dy:'唐',cat:'思乡羁旅',
   lines:['慈母手中线，','游子身上衣。','临行密密缝，','意恐迟迟归。','谁言寸草心，','报得三春晖。'],
   note:'孟郊五十岁及第后所作，歌颂母爱的伟大，"谁言寸草心，报得三春晖"千古流传。'},

  // ===== 崔护 =====
  {id:80,title:'题都城南庄',author:'崔护',dy:'唐',cat:'爱情闺怨',
   lines:['去年今日此门中，','人面桃花相映红。','人面不知何处去，','桃花依旧笑春风。'],
   note:'"人面桃花"自此成为形容美丽女子或物是人非的成语，崔护凭此一首诗名垂千古。'},

  // ===== 柳宗元 =====
  {id:81,title:'江雪',author:'柳宗元',dy:'唐',cat:'山水田园',
   lines:['千山鸟飞绝，','万径人踪灭。','孤舟蓑笠翁，','独钓寒江雪。'],
   note:'极度简洁而意境深远，以大雪封山的空旷背景衬托孤独老翁，寄托了诗人政治失意的孤寂心境。'},

  // ===== 张九龄 =====
  {id:82,title:'望月怀远',author:'张九龄',dy:'唐',cat:'思乡羁旅',
   lines:['海上生明月，','天涯共此时。','情人怨遥夜，','竟夕起相思。','灭烛怜光满，','披衣觉露滋。','不堪盈手赠，','还寝梦佳期。'],
   note:'"海上生明月，天涯共此时"早已成为中国人思念远方亲友时最常引用的诗句之一。'},

  // ===== 张若虚 =====
  {id:83,title:'春江花月夜（节选）',author:'张若虚',dy:'唐',cat:'山水田园',
   lines:['春江潮水连海平，','海上明月共潮生。','滟滟随波千万里，','何处春江无月明。','江流宛转绕芳甸，','月照花林皆似霰。','空里流霜不觉飞，','汀上白沙看不见。'],
   note:'被誉为"诗中的诗，顶峰上的顶峰"，张若虚以此一首诗名垂千古，写尽宇宙人生的深邃思考。'},

  // ===== 韩愈 =====
  {id:84,title:'早春呈水部张十八员外',author:'韩愈',dy:'唐',cat:'山水田园',
   lines:['天街小雨润如酥，','草色遥看近却无。','最是一年春好处，','绝胜烟柳满皇都。'],
   note:'韩愈描写早春的佳作，以细腻笔触捕捉春草初生的微妙景象。'},

  // ===== 岑参 =====
  {id:85,title:'白雪歌送武判官归京',author:'岑参',dy:'唐',cat:'边塞军旅',
   lines:['北风卷地白草折，','胡天八月即飞雪。','忽如一夜春风来，','千树万树梨花开。','散入珠帘湿罗幕，','狐裘不暖锦衾薄。','将军角弓不得控，','都护铁衣冷难着。'],
   note:'岑参边塞诗代表作，以梨花比喻雪花，瑰丽奇峭，展现边疆奇景。'},
  {id:86,title:'逢入京使',author:'岑参',dy:'唐',cat:'思乡羁旅',
   lines:['故园东望路漫漫，','双袖龙钟泪不干。','马上相逢无纸笔，','凭君传语报平安。'],
   note:'岑参在边疆偶遇入京使者，托其传语家人，道尽征人思乡之情。'},

  // ===== 高适 =====
  {id:87,title:'别董大',author:'高适',dy:'唐',cat:'送别离情',
   lines:['千里黄云白日曛，','北风吹雁雪纷纷。','莫愁前路无知己，','天下谁人不识君。'],
   note:'高适送别诗名篇，以豪迈笔调鼓励友人，"天下谁人不识君"成为千古励志名句。'},
  {id:88,title:'燕歌行',author:'高适',dy:'唐',cat:'边塞军旅',
   lines:['汉家烟尘在东北，','汉将辞家破残贼。','男儿本自重横行，','天子非常赐颜色。','摐金伐鼓下榆关，','旌旆逶迤碣石间。','校尉羽书飞瀚海，','单于猎火照狼山。'],
   note:'高适边塞诗代表作，描写征战艰苦，讽刺将领骄奢，充满对士兵的同情。'},

  // ===== 贺知章 =====
  {id:89,title:'回乡偶书',author:'贺知章',dy:'唐',cat:'思乡羁旅',
   lines:['少小离家老大回，','乡音无改鬓毛衰。','儿童相见不相识，','笑问客从何处来。'],
   note:'贺知章晚年回乡时所作，感慨时光流逝，人事沧桑，真挚感人。'},

  // ===== 卢纶 =====
  {id:90,title:'塞下曲·其二',author:'卢纶',dy:'唐',cat:'边塞军旅',
   lines:['林暗草惊风，','将军夜引弓。','平明寻白羽，','没在石棱中。'],
   note:'卢纶边塞诗，以李广射石的故事赞颂将军的神勇。'},
  {id:91,title:'塞下曲·其三',author:'卢纶',dy:'唐',cat:'边塞军旅',
   lines:['月黑雁飞高，','单于夜遁逃。','欲将轻骑逐，','大雪满弓刀。'],
   note:'卢纶描写将军雪夜追敌的壮烈场景，气势豪迈。'},

  // ===== 祖咏 =====
  {id:92,title:'终南望余雪',author:'祖咏',dy:'唐',cat:'山水田园',
   lines:['终南阴岭秀，','积雪浮云端。','林表明霁色，','城中增暮寒。'],
   note:'祖咏应试时所作，虽仅四句却被赞为咏雪佳作。'},

  // ===== 韦应物 =====
  {id:93,title:'滁州西涧',author:'韦应物',dy:'唐',cat:'山水田园',
   lines:['独怜幽草涧边生，','上有黄鹂深树鸣。','春潮带雨晚来急，','野渡无人舟自横。'],
   note:'韦应物描写西涧春景的佳作，"野渡无人舟自横"为千古名句，意境幽静。'},
  {id:94,title:'秋夜寄邱员外',author:'韦应物',dy:'唐',cat:'思乡羁旅',
   lines:['怀君属秋夜，','散步咏凉天。','空山松子落，','幽人应未眠。'],
   note:'韦应物秋夜怀念友人的诗作，以松子落地衬托思念之情，意境清幽。'},

  // ===== 李颀 =====
  {id:95,title:'古从军行',author:'李颀',dy:'唐',cat:'边塞军旅',
   lines:['白日登山望烽火，','黄昏饮马傍交河。','行人刁斗风沙暗，','公主琵琶幽怨多。','野云万里无城郭，','雨雪纷纷连大漠。','胡雁哀鸣夜夜飞，','胡儿眼泪双双落。'],
   note:'李颀边塞诗，描写边疆艰苦，讽刺统治者开边战争的无意义。'},

  // ===== 常建 =====
  {id:96,title:'题破山寺后禅院',author:'常建',dy:'唐',cat:'哲理禅意',
   lines:['清晨入古寺，','初日照高林。','曲径通幽处，','禅房花木深。','山光悦鸟性，','潭影空人心。','万籁此都寂，','但余钟磬音。'],
   note:'常建描写禅寺清幽之作，"曲径通幽处，禅房花木深"为千古名句。'},

  // ===== 王勃 =====
  {id:97,title:'送杜少府之任蜀州',author:'王勃',dy:'唐',cat:'送别离情',
   lines:['城阙辅三秦，','风烟望五津。','与君离别意，','同是宦游人。','海内存知己，','天涯若比邻。','无为在歧路，','儿女共沾巾。'],
   note:'王勃送别诗名篇，"海内存知己，天涯若比邻"一扫离别悲酸，豪迈开阔。'},

  // ===== 陈子昂 =====
  {id:98,title:'登幽州台歌',author:'陈子昂',dy:'唐',cat:'怀古咏史',
   lines:['前不见古人，','后不见来者。','念天地之悠悠，','独怆然而涕下。'],
   note:'陈子昂登台抒怀之作，慨叹宇宙无穷而人生短暂，孤独苍凉，气势磅礴。'},

  // ===== 宋之问 =====
  {id:99,title:'渡汉江',author:'宋之问',dy:'唐',cat:'思乡羁旅',
   lines:['岭外音书断，','经冬复历春。','近乡情更怯，','不敢问来人。'],
   note:'宋之问流放岭南遇赦北归时所作，"近乡情更怯"刻画了游子返乡时的复杂心理。'},

  // ===== 畅当 =====
  {id:100,title:'登鹳雀楼',author:'畅当',dy:'唐',cat:'哲理禅意',
   lines:['迥临飞鸟上，','高出世尘间。','天势围平野，','河流入断山。'],
   note:'畅当咏鹳雀楼之作，虽不如王之涣同名诗作著名，亦气象开阔。'},

  // ===== 王翰 =====
  {id:101,title:'凉州词',author:'王翰',dy:'唐',cat:'边塞军旅',
   lines:['葡萄美酒夜光杯，','欲饮琵琶马上催。','醉卧沙场君莫笑，','古来征战几人回？'],
   note:'王翰边塞诗名篇，以豪放笔调写将士的醉饮与悲壮，"古来征战几人回"令人动容。'},

  // ===== 张旭 =====
  {id:102,title:'桃花溪',author:'张旭',dy:'唐',cat:'山水田园',
   lines:['隐隐飞桥隔野烟，','石矶西畔问渔船。','桃花尽日随流水，','洞在清溪何处边。'],
   note:'张旭描写桃花溪的诗作，意境朦胧，引人遐想桃源仙境。'},

  // ===== 贾岛 =====
  {id:103,title:'寻隐者不遇',author:'贾岛',dy:'唐',cat:'山水田园',
   lines:['松下问童子，','言师采药去。','只在此山中，','云深不知处。'],
   note:'贾岛访隐者不遇之作，以问答形式展现隐者的超逸，意境深远。'},
  {id:104,title:'题李凝幽居',author:'贾岛',dy:'唐',cat:'山水田园',
   lines:['闲居少邻并，','草径入荒园。','鸟宿池边树，','僧敲月下门。','过桥分野色，','移石动云根。','暂去还来此，','幽期不负言。'],
   note:'贾岛名篇，"僧敲月下门"为推敲典故出处，展现诗人苦吟精神。'},

  // ===== 施肩吾 =====
  {id:105,title:'幼女词',author:'施肩吾',dy:'唐',cat:'咏物言志',
   lines:['幼女才六岁，','未知巧与拙。','向夜在堂前，','学人拜新月。'],
   note:'施肩吾描写幼女学拜月的可爱场景，天真纯朴。'},

  // ===== 李约 =====
  {id:106,title:'观祈雨',author:'李约',dy:'唐',cat:'咏物言志',
   lines:['桑条无叶土生烟，','箫管迎龙水庙前。','朱门几处看歌舞，','犹恐春阴咽管弦。'],
   note:'李约讽刺豪门在干旱时仍歌舞享乐，对比鲜明，寓意深刻。'},

  // ===== 温庭筠 =====
  {id:107,title:'商山早行',author:'温庭筠',dy:'唐',cat:'思乡羁旅',
   lines:['晨起动征铎，','客行悲故乡。','鸡声茅店月，','人迹板桥霜。','槲叶落山路，','枳花明驿墙。','因思杜陵梦，','凫雁满回塘。'],
   note:'温庭筠羁旅诗名篇，"鸡声茅店月，人迹板桥霜"为千古名句，意象组合精妙。'},

  // ===== 罗隐 =====
  {id:108,title:'蜂',author:'罗隐',dy:'唐',cat:'咏物言志',
   lines:['不论平地与山尖，','无限风光尽被占。','采得百花成蜜后，','为谁辛苦为谁甜？'],
   note:'罗隐咏蜂之作，以蜜蜂辛勤酿蜜比喻劳动者的辛劳，寓意深远。'},

  // ===== 郑谷 =====
  {id:109,title:'淮上与友人别',author:'郑谷',dy:'唐',cat:'送别离情',
   lines:['扬子江头杨柳春，','杨花愁杀渡江人。','数声风笛离亭晚，','君向潇湘我向秦。'],
   note:'郑谷江边送别诗作，以杨柳、杨花渲染离别愁绪，情深意切。'},

  // ===== 杜荀鹤 =====
  {id:110,title:'山中寡妇',author:'杜荀鹤',dy:'唐',cat:'咏物言志',
   lines:['夫因兵死守蓬茅，','麻苎衣衫鬓发焦。','桑柘废来犹纳税，','田园荒后尚征苗。','时挑野菜和根煮，','旋斫生柴带叶烧。','任是深山更深处，','也应无计避征徭。'],
   note:'杜荀鹤反映百姓苦难的诗作，揭露赋税沉重，充满对人民的同情。'},

  // ===== 畅诸 =====
  {id:111,title:'登鹳雀楼',author:'畅诸',dy:'唐',cat:'哲理禅意',
   lines:['城楼多峻极，','列岫满古氛。','天势围平野，','河流入断山。'],
   note:'畅诸咏鹳雀楼之作，气象开阔，与畅当之作风格相近。'},
];

let currentPoem = null;
let readMode = 'h';
let filtered = [...DB];

function init() {
  const day = new Date().getDate();
  const heroP = DB[day % DB.length];
  renderHero(heroP);
  renderGrid(DB);
}

function renderHero(p) {
  document.getElementById('hTitle').textContent = p.title;
  document.getElementById('hMeta').innerHTML = `【${p.dy}】<b>${p.author}</b>&nbsp;·&nbsp;${p.cat}`;
  document.getElementById('hLines').innerHTML = p.lines.slice(0,4).map(l=>`<div>${l}</div>`).join('');
  document.getElementById('hWater').textContent = p.title;
  document.getElementById('heroCard').onclick = () => openPoem(p);
}

function renderGrid(list) {
  const grid = document.getElementById('poemGrid');
  const empty = document.getElementById('emptyMsg');
  if (!list.length) { grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = list.map((p,i) => `
    <div class="poem-card" style="animation:cardIn 0.5s ${(i%12)*0.04}s ease both" onclick='openPoem(${JSON.stringify(p)})'>
      <div class="pc-id">${String(p.id).padStart(3,'0')}</div>
      <div class="pc-title">${p.title}</div>
      <div class="pc-author">【${p.dy}】<span>${p.author}</span></div>
      <div class="pc-preview">${p.lines.join('')}</div>
      <div class="pc-cat">${p.cat}</div>
    </div>
  `).join('');
  // inject animation keyframe once
  if (!document.getElementById('cardAnim')) {
    const s = document.createElement('style');
    s.id = 'cardAnim';
    s.textContent = '@keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}';
    document.head.appendChild(s);
  }
}

function filterCat(cat, btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('searchInput').value = '';
  filtered = cat === '全部' ? [...DB] : DB.filter(p => p.cat === cat);
  document.getElementById('secHd').textContent = cat === '全部' ? '经 典 名 篇' : cat;
  renderGrid(filtered);
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('on'));
  document.querySelector('.cat-btn').classList.add('on');
  if (!q) { filtered = [...DB]; document.getElementById('secHd').textContent = '经 典 名 篇'; renderGrid(DB); return; }
  filtered = DB.filter(p => p.title.includes(q) || p.author.includes(q) || p.lines.some(l=>l.includes(q)));
  document.getElementById('secHd').textContent = `「${q}」搜索结果`;
  renderGrid(filtered);
}

function openPoem(p) {
  currentPoem = p;
  document.getElementById('mTitle').textContent = p.title;
  document.getElementById('mMeta').innerHTML = `【${p.dy}】<span>${p.author}</span>&ensp;·&ensp;${p.cat}`;
  document.getElementById('mNote').textContent = p.note || '';
  setMode(readMode, false);
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function setMode(m, fromBtn=true) {
  readMode = m;
  document.getElementById('btnH').classList.toggle('on', m==='h');
  document.getElementById('btnV').classList.toggle('on', m==='v');
  const el = document.getElementById('mPoem');
  el.className = 'modal-panel-poem m-poem' + (m==='v' ? ' vert' : '');
  el.innerHTML = currentPoem.lines.map(l=>`<div>${l}</div>`).join('');
}

function maybeClose(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function openImm() {
  const p = currentPoem;
  document.getElementById('immTitle').textContent = `${p.title} · ${p.author}`;
  document.getElementById('immPoem').textContent = p.lines.join('');
  document.getElementById('immersive').classList.add('open');
}
function closeImm() { document.getElementById('immersive').classList.remove('open'); }

// Ink ripple on click
document.addEventListener('click', e => {
  const r = document.createElement('div');
  r.className = 'ripple';
  const size = 70;
  r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-size/2}px;top:${e.clientY-size/2}px`;
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 560);
});

document.addEventListener('keydown', e => {
  if (e.key==='Escape') { closeModal(); closeImm(); }
});

init();
</script>
